openapi: 3.0.3
info:
  title: IMMZ.D13.Update client record API
  description: Data elements for the IMMZ.D13.Update client record Data Dictionary
    Activity.
  version: 1.0.0
paths:
  /StructureDefinition-IMMZ_D13_Update_client_record.schema.json:
    get:
      summary: JSON Schema definition for the Logical Model StructureDefinition-IMMZ_D13_Update_client_record
      description: This endpoint serves the JSON Schema definition for the Logical
        Model StructureDefinition-IMMZ_D13_Update_client_record.
      responses:
        '200':
          description: The JSON Schema for StructureDefinition-IMMZ_D13_Update_client_record
          content:
            application/schema+json:
              schema:
                $ref: ./StructureDefinition-IMMZ_D13_Update_client_record.schema.json
components:
  schemas:
    StructureDefinition-IMMZ_D13_Update_client_record:
      $schema: https://json-schema.org/draft/2020-12/schema
      $id: http://smart.who.int/immunizations/StructureDefinition-IMMZ_D13_Update_client_record.schema.json
      title: IMMZ.D13.Update client record
      description: Data elements for the IMMZ.D13.Update client record Data Dictionary
        Activity.
      type: object
      properties:
        IMMZD13:
          type: array
          items:
            type: object
            description: 'FHIR '
          description: Data elements for the IMMZ.D13.Update client record Data Dictionary
            Activity.
        patient:
          type: object
          description: The patient.
        birthDose:
          type: boolean
          description: Indicates if the client received a dose within 24 hours of
            birth. Whether a birth dose is counted as part of the primary series will
            depend on the antigen
        typeOfDose:
          type: object
          description: The type of dose in a series that the client received
          properties:
            system:
              type: string
            code:
              $ref: ValueSet-IMMZ.D.DE258.schema.json
            display:
              type: string
        completedThePrimaryVaccinationSeries:
          type: boolean
          description: Indicates if the client has completed the primary vaccination
            series of a product/antigen. If the client has not yet completed their
            primary series, it means they may be expected to receive more doses to
            complete their vaccination regimen for the respective product/antigen
        completedTheBoosterSeries:
          type: boolean
          description: Indicates if the client has completed the booster series of
            a product/antigen
        dateWhenPrimaryVaccinationSeriesWasCompleted:
          type: string
          format: date
          description: The date when the client completed the primary vaccination
            series (per product/antigen)
        hivStatus:
          type: object
          description: The current HIV status of the client
          properties:
            system:
              type: string
            code:
              $ref: ValueSet-IMMZ.D.DE204.schema.json
            display:
              type: string
        typeOfPoliovirusDose:
          type: object
          description: The type of the poliovirus vaccine dose administered to the
            client
          properties:
            system:
              type: string
            code:
              $ref: ValueSet-IMMZ.D.DE212.schema.json
            display:
              type: string
        typeOfJeDose:
          type: object
          description: The type of Japanese encephalitis (JE) vaccine dose administered
            to the client
          properties:
            system:
              type: string
            code:
              $ref: ValueSet-IMMZ.D.DE216.schema.json
            display:
              type: string
        typeOfTbeDose:
          type: object
          description: The type of tick-borne encephalitis (TBE) vaccine dose administered
          properties:
            system:
              type: string
            code:
              $ref: ValueSet-IMMZ.D.DE220.schema.json
            display:
              type: string
        typeOfTyphoidDose:
          type: object
          description: The type of typhoid vaccine dose administered to the client
          properties:
            system:
              type: string
            code:
              $ref: ValueSet-IMMZ.D.DE225.schema.json
            display:
              type: string
        typeOfCholeraDose:
          type: object
          description: The type of cholera vaccine dose administered to the client
          properties:
            system:
              type: string
            code:
              $ref: ValueSet-IMMZ.D.DE229.schema.json
            display:
              type: string
        typeOfMeningococcalDose:
          type: object
          description: The type of meningococcal vaccine dose administered to the
            client
          properties:
            system:
              type: string
            code:
              $ref: ValueSet-IMMZ.D.DE232.schema.json
            display:
              type: string
        typeOfHepatitisADose:
          type: object
          description: The type of hepatitis A-containing vaccine dose administered
            to the client
          properties:
            system:
              type: string
            code:
              $ref: ValueSet-IMMZ.D.DE237.schema.json
            display:
              type: string
        typeOfHepatitisBDose:
          type: object
          description: The type of hepatitis B-containing vaccine dose administered
            to the client
          properties:
            system:
              type: string
            code:
              $ref: ValueSet-IMMZ.D.DE254.schema.json
            display:
              type: string
        vaccineType:
          type: array
          items:
            type: object
            description: Coding from ValueSet IMMZ.Z.VS
            properties:
              system:
                type: string
              code:
                $ref: ValueSet-IMMZ.Z.VS.schema.json
              display:
                type: string
          minItems: 1
          description: Vaccine type/category that was administered or was to be administered.
            Any vaccine code available in the IMMZ.Z Vaccine library list of codes
            applies in this data element
        dateAndTimeOfVaccination:
          type: string
          format: date-time
          description: Represents the visit/encounter date, which is the date and
            time when each vaccine was administered to the client
        contactDate:
          type: string
          format: date-time
          description: The date and time of the client's contact
        ancContactNumber:
          type: integer
          description: The antenatal care (ANC) contact or visit number
        doseNumber:
          type: integer
          description: Vaccine dose number including dose number within series
        immunizationEventStatus:
          type: object
          description: The current status of the individual immunization event
          properties:
            system:
              type: string
            code:
              $ref: ValueSet-IMMZ.D.DE1.schema.json
            display:
              type: string
        reasonVaccineWasNotAdministered:
          type: object
          description: The reason this immunization event was not performed
          properties:
            system:
              type: string
            code:
              $ref: ValueSet-IMMZ.D.DE5.schema.json
            display:
              type: string
        vaccineBrand:
          type: object
          description: The brand or trade name used to refer to the vaccine received
          properties:
            system:
              type: string
            code:
              $ref: ValueSet-IMMZ.D.DE18.schema.json
            display:
              type: string
        liveVaccine:
          type: boolean
          description: Uses a living but weakened version of the virus or one that
            is very similar
        countryOfVaccination:
          type: object
          description: The service delivery country where the vaccine administration
            occurred
          properties:
            system:
              type: string
            code:
              $ref: ValueSet-iso3166-1-3.schema.json
            display:
              type: string
        administrativeArea:
          type: object
          description: The service delivery location (location name, city, municipality,
            town or village) where the vaccine administration occurred
        vaccineManufacturer:
          type: object
          description: The manufacturer of the vaccine product
          properties:
            system:
              type: string
            code:
              $ref: ValueSet-IMMZ.D.DE23.schema.json
            display:
              type: string
        vaccineBatchNumber:
          type: string
          description: Batch number or lot number of vaccine
        vaccineMarketAuthorizationHolder:
          type: object
          description: Name of the market authorization holder of the vaccine received.
            If market authorization holder is unknown, vaccine manufacturer is REQUIRED
          properties:
            system:
              type: string
            code:
              $ref: ValueSet-IMMZ.D.DE25.schema.json
            display:
              type: string
        expirationDate:
          type: string
          format: date
          description: The expiration date of the vaccine
        doseQuantity:
          type: object
          description: The quantity of vaccine product that was administered
        healthWorkerIdentifier:
          type: string
          description: The person, organization or role of the entity that performed
            the act of giving the vaccine to the client. The implementing system can
            choose to populate this field using data from a health worker registry
            or health-care facility registry
        totalDosesInSeries:
          type: integer
          description: The recommended number of doses for immunity according to the
            national immunization schedule (which may be based on product, age, etc.)
        diseaseTargeted:
          type: array
          items:
            type: object
            description: Coding from ValueSet IMMZ.D.DE126
            properties:
              system:
                type: string
              code:
                $ref: ValueSet-IMMZ.D.DE126.schema.json
              display:
                type: string
          description: Vaccine-preventable disease being targeted
        dueDateOfNextDose:
          type: string
          format: date
          description: Date on which the next vaccination should be administered,
            if a next dose is required
      required:
      - patient
      - typeOfDose
      - vaccineType
      - dateAndTimeOfVaccination
      - doseNumber
      - immunizationEventStatus
      - vaccineBrand
      - countryOfVaccination
      - vaccineManufacturer
      - vaccineMarketAuthorizationHolder
      fhir:logicalModel: http://smart.who.int/immunizations/StructureDefinition/IMMZD13
      fhir:parent: http://hl7.org/fhir/StructureDefinition/Base
