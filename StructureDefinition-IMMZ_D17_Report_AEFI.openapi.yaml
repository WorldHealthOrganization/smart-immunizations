openapi: 3.0.3
info:
  title: IMMZ.D17.Report AEFI API
  description: Data elements for the IMMZ.D17.Report AEFI Data Dictionary Activity.
  version: 1.0.0
paths:
  /StructureDefinition-IMMZ_D17_Report_AEFI.schema.json:
    get:
      summary: JSON Schema definition for the Logical Model StructureDefinition-IMMZ_D17_Report_AEFI
      description: This endpoint serves the JSON Schema definition for the Logical
        Model StructureDefinition-IMMZ_D17_Report_AEFI.
      responses:
        '200':
          description: The JSON Schema for StructureDefinition-IMMZ_D17_Report_AEFI
          content:
            application/schema+json:
              schema:
                $ref: ./StructureDefinition-IMMZ_D17_Report_AEFI.schema.json
components:
  schemas:
    StructureDefinition-IMMZ_D17_Report_AEFI:
      $schema: https://json-schema.org/draft/2020-12/schema
      $id: http://smart.who.int/immunizations/StructureDefinition-IMMZ_D17_Report_AEFI.schema.json
      title: IMMZ.D17.Report AEFI
      description: Data elements for the IMMZ.D17.Report AEFI Data Dictionary Activity.
      type: object
      properties:
        IMMZD17:
          type: array
          items:
            type: object
            description: 'FHIR '
          description: Data elements for the IMMZ.D17.Report AEFI Data Dictionary
            Activity.
        patient:
          type: object
          description: The patient.
        reactionReported:
          type: boolean
          description: Indicates observation of an adverse event/reaction
        reactionDate:
          type: string
          format: date
          description: When adverse event/reaction started
        reactionManifestation:
          type: object
          description: The manifestation of the reaction (e.g. infected abscess, swelling,
            rash, hives, diarrhoea, etc.) observed after administering the vaccine
          properties:
            system:
              type: string
            code:
              $ref: ValueSet-IMMZ.D.DE95.schema.json
            display:
              type: string
        typeOfReaction:
          type: object
          description: If the event resulted in a reaction, what is the type of reaction
          properties:
            system:
              type: string
            code:
              $ref: ValueSet-IMMZ.D.DE107.schema.json
            display:
              type: string
        otherImportantMedicalEvent:
          type: string
          description: There was another important reaction or medical event
        reactionOutcome:
          type: object
          description: The outcome of the reaction (e.g. death, recovered, recovering)
          properties:
            system:
              type: string
            code:
              $ref: ValueSet-IMMZ.D.DE115.schema.json
            display:
              type: string
      required:
      - patient
      fhir:logicalModel: http://smart.who.int/immunizations/StructureDefinition/IMMZD17
      fhir:parent: http://hl7.org/fhir/StructureDefinition/Base
